<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AI Smart Road Monitoring – Login</title>

    <!-- Bootstrap 5 -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}"/>

    <style>
        /* YOUR EXISTING CSS — UNCHANGED */
        body {
            min-height: 100vh;
            background: radial-gradient(circle at top left, #1f6feb, #030712);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .login-card {
            max-width: 420px;
            width: 100%;
            background: rgba(15,23,42,0.96);
            border-radius: 18px;
            box-shadow: 0 18px 40px rgba(0,0,0,0.55);
            border: 1px solid rgba(148, 163, 184, 0.3);
            color: #e5e7eb;
            backdrop-filter: blur(12px);
        }
        .brand-badge { display:flex; align-items:center; gap:10px; }
        .brand-logo {
            width:40px; height:40px; border-radius:12px;
            background:linear-gradient(135deg,#22c55e,#22d3ee);
            display:flex; align-items:center; justify-content:center;
            font-weight:700; color:#020617; font-size:20px;
        }
        .brand-text-title { font-size:18px; font-weight:600; }
        .brand-text-subtitle { font-size:12px; color:#9ca3af; }
        .form-control {
            background-color:#020617; border-radius:12px;
            border:1px solid #1f2937; color:#e5e7eb; font-size:14px;
        }
        .form-control:focus {
            border-color:#22c55e;
            box-shadow:0 0 0 1px rgba(34,197,94,0.6);
        }
        .login-btn {
            border-radius:100px;
            font-weight:600;
            text-transform:uppercase;
            background:linear-gradient(135deg,#22c55e,#22d3ee);
            border:none; color:#020617;
        }
    </style>
</head>
<body>

<div class="login-card p-4 p-md-5">

    <!-- Branding -->
    <div class="brand-badge mb-4">
        <div class="brand-logo">AI</div>
        <div>
            <div class="brand-text-title">Smart Road Monitoring</div>
            <div class="brand-text-subtitle">AI + IoT + City Intelligence</div>
        </div>
    </div>

    <h5 class="mb-3">Sign in</h5>
    <p class="small-text mb-4">Use your admin / municipal / collector credentials to access the dashboard.</p>

    <!-- Error message -->
    <div th:if="${param.error}" class="alert alert-danger">
        Invalid username or password. Please try again.
    </div>

    <!-- Logout message -->
    <div th:if="${param.logout}" class="alert alert-success">
        You have been logged out successfully.
    </div>

    <!-- LOGIN FORM -->
    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input name="username" type="text" class="form-control" placeholder="e.g. admin" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input name="password" type="password" class="form-control" placeholder="Enter your password" required>
        </div>

        <p class="small-text">Default: <b>admin / admin123</b></p>

        <button type="submit" class="btn login-btn w-100 mt-3">Sign In</button>
    </form>
</div>

</body>
</html>
