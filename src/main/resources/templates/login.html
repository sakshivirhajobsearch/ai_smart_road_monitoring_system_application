<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AI Smart Road Monitoring – Login</title>

    <!-- Bootstrap 5 CDN -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >

    <!-- Global CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}"/>

    <style>
        body {
            min-height: 100vh;
            background: radial-gradient(circle at top left, #1f6feb, #030712);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .login-card {
            max-width: 420px;
            width: 100%;
            background: rgba(15,23,42,0.96);
            border-radius: 18px;
            box-shadow: 0 18px 40px rgba(0,0,0,0.55);
            border: 1px solid rgba(148, 163, 184, 0.3);
            color: #e5e7eb;
            backdrop-filter: blur(12px);
        }

        .brand-badge {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-logo {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, #22c55e, #22d3ee);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #020617;
            font-size: 20px;
        }

        .brand-text-title {
            font-size: 18px;
            font-weight: 600;
        }

        .brand-text-subtitle {
            font-size: 12px;
            color: #9ca3af;
        }

        .form-label {
            font-size: 13px;
            color: #cbd5f5;
        }

        .form-control {
            background-color: #020617;
            border-radius: 12px;
            border: 1px solid #1f2937;
            color: #e5e7eb;
            font-size: 14px;
        }

        .form-control:focus {
            background-color: #020617;
            color: #e5e7eb;
            border-color: #22c55e;
            box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.6);
        }

        .login-btn {
            border-radius: 999px;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            font-size: 13px;
            padding: 10px 16px;
            background: linear-gradient(135deg, #22c55e, #22d3ee);
            border: none;
            color: #020617;
        }

        .login-btn:hover {
            filter: brightness(1.05);
        }

        .small-text {
            font-size: 12px;
            color: #9ca3af;
        }

        .status-msg {
            font-size: 13px;
            border-radius: 10px;
        }

        a.link-muted {
            color: #9ca3af;
            text-decoration: none;
            font-size: 12px;
        }

        a.link-muted:hover {
            color: #e5e7eb;
        }
    </style>
</head>
<body>

<div class="login-card p-4 p-md-5">

    <!-- Brand -->
    <div class="brand-badge mb-4">
        <div class="brand-logo">AI</div>
        <div>
            <div class="brand-text-title">Smart Road Monitoring</div>
            <div class="brand-text-subtitle">AI + IoT + City Intelligence</div>
        </div>
    </div>

    <!-- Title -->
    <h5 class="mb-3">Sign in</h5>
    <p class="small-text mb-4">
        Use your admin / municipal / collector credentials to access the dashboard.
    </p>

    <!-- Error Messages -->
    <div th:if="${param.error} != null"
         class="alert alert-danger status-msg py-2 px-3 mb-3">
        Invalid username or password. Please try again.
    </div>

    <div th:if="${param.logout} != null"
         class="alert alert-success status-msg py-2 px-3 mb-3">
        You have been logged out successfully.
    </div>

    <!-- Login Form -->
    <form th:action="@{/doLogin}" method="post" autocomplete="off">
        <div class="mb-3">
            <label class="form-label" for="username">Username</label>
            <input id="username" name="username" type="text"
                   class="form-control" placeholder="e.g. admin" required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="password">Password</label>
            <input id="password" name="password" type="password"
                   class="form-control" placeholder="Enter your password" required>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="small-text">Default: <strong>admin / admin123</strong></span>
        </div>

        <div class="d-grid mb-2">
            <button type="submit" class="btn login-btn">Sign In</button>
        </div>

        <div class="d-flex justify-content-between mt-2">
            <a href="#" class="link-muted">Forgot password?</a>
            <a href="#" class="link-muted">Need help?</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>

</body>
</html>
