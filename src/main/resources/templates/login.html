<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login – AI Smart Road Monitoring</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background: radial-gradient(circle at top left, #1f6feb, #030712);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .login-box {
            background: rgba(15,23,42,0.92);
            padding: 30px;
            border-radius: 16px;
            width: 380px;
        }

        .btn-login {
            background: linear-gradient(135deg, #22c55e, #22d3ee);
            color: #020617;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h3 class="text-center mb-4">Login</h3>

    <form th:action="@{/do-login}" method="post">

        <div th:if="${param.error}" class="alert alert-danger p-2">
            Invalid username or password.
        </div>

        <div th:if="${param.logout}" class="alert alert-success p-2">
            Logged out successfully.
        </div>

        <div class="mb-3">
            <label>Username</label>
            <input class="form-control" type="text" name="username" required />
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input class="form-control" type="password" name="password" required />
        </div>

        <button class="btn btn-login w-100 mt-3" type="submit">Login</button>
    </form>
</div>

</body>
</html>
